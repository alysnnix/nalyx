name: Check NixOS Configurations

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Evaluate and lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      # Evaluates all nixosConfigurations without building them.
      # Uses empty private placeholder since CI has no access to the private repo.
      - name: Evaluate all configurations
        run: nix flake check --no-build --override-input private path:./ci/empty-private

      - name: Check Nix formatting
        run: nix fmt -- --check .
