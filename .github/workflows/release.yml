name: Build NixOS ISOs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-isos:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@v21

    - name: Setup Nix cache
      uses: DeterminateSystems/magic-nix-cache-action@v13

    - name: Build Desktop ISO
      run: |
        nix build .#desktop-iso
        cp result/iso/*.iso desktop-nixos.iso
        rm result

    - name: Build Laptop ISO
      run: |
        nix build .#laptop-iso
        cp result/iso/*.iso laptop-nixos.iso
        rm result

    - name: Build Homelab ISO
      run: |
        nix build .#homelab-iso
        cp result/iso/*.iso homelab-nixos.iso
        rm result

    - name: Upload ISO Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nixos-isos
        path: |
          desktop-nixos.iso
          laptop-nixos.iso
          homelab-nixos.iso
        retention-days: 7
