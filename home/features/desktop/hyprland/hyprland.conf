monitor = , preferred, auto, 1

# Enter global submap (required for catchall keybinds)
exec = hyprctl dispatch submap global
submap = global

$mainMod = SUPER
$terminal = kitty
$fileManager = nautilus

# Autostart -- caelestia starts via systemd, no exec-once needed
exec-once = hyprctl setcursor Bibata-Modern-Classic 24
exec-once = swww init

# Default colors (overridden by Matugen when available)
$primary = rgba(89b4faff)
$surface = rgba(313244ff)

# Load Matugen-generated colors for borders
source = ~/.config/hypr/colors.conf

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    col.active_border = $primary
    col.inactive_border = $surface
    layout = dwindle
}

decoration {
    rounding = 12
    blur {
        enabled = true
        size = 4
        passes = 2
        vibrancy = 0.17
    }
    shadow {
        enabled = true
        range = 8
        render_power = 3
    }
}

animations {
    enabled = yes
    bezier = smooth, 0.25, 0.1, 0.25, 1
    bezier = snappy, 0.4, 0, 0.2, 1
    animation = windows, 1, 4, snappy, popin 85%
    animation = fade, 1, 3, smooth
    animation = workspaces, 1, 3, snappy, slide
    animation = border, 1, 5, smooth
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

# --- Window rules ---
windowrule = match:class pavucontrol, float on
windowrule = match:class blueman-manager, float on
windowrule = match:class mpv, float on
windowrule = match:class mpv, center on
windowrule = match:class mpv, size 934 525
windowrule = match:class qalculate-gtk, float on
windowrule = match:class nwg-look, float on

# --- Core keybinds ---
# 'n' flag = non-consuming, allows catchall to also fire (for launcher interrupt)
bindn = $mainMod, Return, exec, $terminal
bindn = $mainMod, W, killactive
bindn = $mainMod, D, movetoworkspacesilent, special:minimized
bindn = $mainMod, Tab, togglespecialworkspace, minimized
bindn = $mainMod, F, fullscreen, 1
bindn = $mainMod, V, togglefloating

# App launchers
bindn = $mainMod, E, exec, $fileManager
bindn = $mainMod, B, exec, google-chrome-stable
bindn = $mainMod, M, exec, thunderbird
bindn = $mainMod, C, exec, qalculate-gtk
bindn = $mainMod, comma, exec, nwg-look

# Screenshot
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# Media / hardware keys
bind = , XF86AudioRaiseVolume, exec, pamixer -i 10
bind = , XF86AudioLowerVolume, exec, pamixer -d 10
bind = , XF86MonBrightnessUp, exec, brightnessctl set +20%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 20%-

# Focus navigation
bindn = $mainMod, left, movefocus, l
bindn = $mainMod, right, movefocus, r
bindn = $mainMod, up, movefocus, u
bindn = $mainMod, down, movefocus, d

# Resize windows
bindn = $mainMod CTRL, right, resizeactive, 40 0
bindn = $mainMod CTRL, left, resizeactive, -40 0
bindn = $mainMod CTRL, up, resizeactive, 0 -40
bindn = $mainMod CTRL, down, resizeactive, 0 40

# Workspace navigation
bindn = $mainMod ALT, left, workspace, e-1
bindn = $mainMod ALT, right, workspace, e+1

bindn = $mainMod, 1, workspace, 1
bindn = $mainMod, 2, workspace, 2
bindn = $mainMod, 3, workspace, 3
bindn = $mainMod, 4, workspace, 4
bindn = $mainMod, 5, workspace, 5
bindn = $mainMod, 6, workspace, 6
bindn = $mainMod, 7, workspace, 7
bindn = $mainMod, 8, workspace, 8
bindn = $mainMod, 9, workspace, 9

# Move window to workspace
bindn = $mainMod SHIFT, 1, movetoworkspace, 1
bindn = $mainMod SHIFT, 2, movetoworkspace, 2
bindn = $mainMod SHIFT, 3, movetoworkspace, 3
bindn = $mainMod SHIFT, 4, movetoworkspace, 4
bindn = $mainMod SHIFT, 5, movetoworkspace, 5
bindn = $mainMod SHIFT, 6, movetoworkspace, 6
bindn = $mainMod SHIFT, 7, movetoworkspace, 7
bindn = $mainMod SHIFT, 8, movetoworkspace, 8
bindn = $mainMod SHIFT, 9, movetoworkspace, 9

# --- Caelestia global shortcuts ---
# Launcher: Super tap (press + release without other keys)
bindi = Super, Super_L, global, caelestia:launcher
bindin = Super, catchall, global, caelestia:launcherInterrupt
bindin = Super, mouse:272, global, caelestia:launcherInterrupt
bindin = Super, mouse:273, global, caelestia:launcherInterrupt
bindin = Super, mouse:274, global, caelestia:launcherInterrupt
bindin = Super, mouse:275, global, caelestia:launcherInterrupt
bindin = Super, mouse:276, global, caelestia:launcherInterrupt
bindin = Super, mouse:277, global, caelestia:launcherInterrupt
bindin = Super, mouse_up, global, caelestia:launcherInterrupt
bindin = Super, mouse_down, global, caelestia:launcherInterrupt

# Lock screen
bindn = $mainMod, L, global, caelestia:lock

# Clear notifications
bindn = $mainMod SHIFT, N, global, caelestia:clearNotifs
