monitor = , preferred, auto, 1

# Enter global submap (required for catchall keybinds)
exec = hyprctl dispatch submap global
submap = global

$mainMod = SUPER
$terminal = kitty
$fileManager = nautilus

# Autostart -- caelestia starts via systemd, no exec-once needed
exec-once = hyprctl setcursor Adwaita 24
exec-once = swww-daemon && sleep 0.5 && swww img ~/Pictures/wallpapers/catppuccin-dark.jpg --transition-type grow --transition-duration 1

# Default colors (overridden by Matugen when available)
$primary = rgba(89b4faff)
$surface = rgba(313244ff)

# Load Matugen-generated colors for borders
source = ~/.config/hypr/colors.conf

input {
    kb_layout = us,br
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    col.active_border = $primary
    col.inactive_border = $surface
    layout = dwindle
}

decoration {
    rounding = 12
    blur {
        enabled = true
        size = 4
        passes = 2
        vibrancy = 0.17
    }
    shadow {
        enabled = true
        range = 8
        render_power = 3
    }
}

animations {
    enabled = yes
    bezier = smooth, 0.25, 0.1, 0.25, 1
    bezier = snappy, 0.4, 0, 0.2, 1
    animation = windows, 1, 4, snappy, popin 85%
    animation = fade, 1, 3, smooth
    animation = workspaces, 1, 3, snappy, slide
    animation = border, 1, 5, smooth
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

# --- Window rules ---
windowrule = match:class pavucontrol, float on
windowrule = match:class blueman-manager, float on
windowrule = match:class mpv, float on
windowrule = match:class mpv, center on
windowrule = match:class mpv, size 934 525
windowrule = match:class qalculate-gtk, float on
windowrule = match:class nwg-look, float on

# --- Core keybinds ---
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, W, killactive
bind = $mainMod, D, movetoworkspacesilent, special:minimized
bind = $mainMod, Tab, togglespecialworkspace, minimized
bind = $mainMod, F, fullscreen, 1
bind = $mainMod, V, togglefloating

# App launchers
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, google-chrome-stable
bind = $mainMod, M, exec, thunderbird
bind = $mainMod, C, exec, qalculate-gtk
bind = $mainMod, comma, exec, nwg-look

# Keyboard layout switch (us/br)
bind = $mainMod, Space, exec, hyprctl switchxkblayout all next

# Screenshot
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# Media / hardware keys
bind = , XF86AudioRaiseVolume, exec, pamixer -i 10
bind = , XF86AudioLowerVolume, exec, pamixer -d 10
bind = , XF86MonBrightnessUp, exec, brightnessctl set +20%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 20%-

# Focus navigation
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Swap/move windows
bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d

# Resize windows
binde = $mainMod CTRL, right, resizeactive, 40 0
binde = $mainMod CTRL, left, resizeactive, -40 0
binde = $mainMod CTRL, up, resizeactive, 0 -40
binde = $mainMod CTRL, down, resizeactive, 0 40

# Workspace navigation
bind = $mainMod ALT, left, workspace, e-1
bind = $mainMod ALT, right, workspace, e+1

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# --- Caelestia global shortcuts ---
# Launcher (Super tap = open, Super+key = normal shortcut)
bindr = $mainMod, Super_L, global, caelestia:launcher

# Lock screen
bind = $mainMod, L, global, caelestia:lock

# Clear notifications
bind = $mainMod SHIFT, N, global, caelestia:clearNotifs
